<script>
async function sha256(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function sanitizeId(id){
  // Realtime DB 키에 못 쓰는 문자 제거 (. # $ [ ] /)
  return id.replace(/[.#$\[\]/]/g,'');
}
function waitFirebase(){
  return new Promise(res=>{
    if(window._fbReady) return res();
    document.addEventListener('firebase-ready', ()=>res(), {once:true});
  });
}

const idInput = document.getElementById('idInput');
const pwInput = document.getElementById('pwInput');
const btnLogin = document.getElementById('btnLogin');
const btnSignup = document.getElementById('btnSignup');
const loginMsg = document.getElementById('loginMsg');

function setMsg(text, busy){
  loginMsg.textContent = text || '';
  btnLogin.disabled = !!busy;
  btnSignup.disabled = !!busy;
}

function validateInputs(){
  const id = idInput.value.trim();
  const pw = pwInput.value;
  if(!id || !pw){ setMsg('아이디와 비밀번호를 입력해줘'); return null; }
  const cleanId = sanitizeId(id);
  if(cleanId !== id || id.length < 3){ setMsg('아이디는 3자 이상, 특수문자(. # $ [ ] /) 불가'); return null; }
  if(pw.length < 4){ setMsg('비밀번호는 4자 이상'); return null; }
  return {id, pw};
}

async function onSignup(){
  const v = validateInputs();
  if(!v) return;
  setMsg('가입 중...', true);
  await waitFirebase();
  try{
    const userRef = window._fb.ref('eraser3d_users/'+v.id);
    const snap = await window._fb.get(userRef);
    if(snap.exists()){ setMsg('이미 있는 아이디야'); setMsg('이미 있는 아이디야', false); return; }
    const hash = await sha256(v.pw);
    await window._fb.set(userRef, { password: hash, createdAt: Date.now() });
    setMsg('가입 완료! 로그인 해줘', false);
  }catch(err){
    console.error(err);
    setMsg('오류가 발생했어: '+err.message, false);
  }
}

async function onLogin(){
  const v = validateInputs();
  if(!v) return;
  setMsg('로그인 중...', true);
  await waitFirebase();
  try{
    const userRef = window._fb.ref('eraser3d_users/'+v.id);
    const snap = await window._fb.get(userRef);
    if(!snap.exists()){ setMsg('없는 아이디야', false); return; }
    const hash = await sha256(v.pw);
    if(snap.val().password !== hash){ setMsg('비밀번호가 틀렸어', false); return; }
    setMsg('로그인 성공!', true);
    window.CURRENT_USER = v.id;
    document.getElementById('loginScreen').style.display = 'none';
    if(window.setPlayerName) window.setPlayerName(v.id);
    if(window.showHomeScreen) window.showHomeScreen(v.id);
  }catch(err){
    console.error(err);
    setMsg('오류가 발생했어: '+err.message, false);
  }
}

btnLogin.addEventListener('click', onLogin);
btnSignup.addEventListener('click', onSignup);
pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter') onLogin(); });
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
// ===== 기본 씬 세팅 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 20, 80);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ===== 조명 =====
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(20,30,10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-40; sun.shadow.camera.right=40;
sun.shadow.camera.top=40; sun.shadow.camera.bottom=-40;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// ===== 바닥 (회색) =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x999999})
);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// 참고용 박스들 (맵 오브젝트 자리)
for(let i=0;i<15;i++){
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(2,2,2),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  box.position.set((Math.random()-0.5)*60, 1, (Math.random()-0.5)*60);
  box.castShadow = true; box.receiveShadow = true;
  scene.add(box);
}

// ===== 지우개 캐릭터 (귀여운 카툰풍) =====
// 짜부된 느낌을 없애기 위해 세로(높이)를 늘리고, 두께도 살짝 키워 비율을 맞춤
const BODY_W = 1.0;   // 너비 (기존 1.2 → 살짝 줄임)
const BODY_H = 1.5;   // 높이 (기존 0.9 → 대폭 늘림, 길쭉하게)
const BODY_D = 0.65;  // 두께 (기존 0.6 → 살짝 늘림)

// 지우개 모델 생성 함수 (메인 월드 캐릭터 / 홈 화면 미리보기 둘 다 재사용)
function buildEraserModel(){
  const group = new THREE.Group();

  const bodyMat = new THREE.MeshStandardMaterial({color:0xff6fa5});
  const body = new THREE.Mesh(new THREE.BoxGeometry(BODY_W, BODY_H, BODY_D), bodyMat);
  body.position.y = BODY_H/2;
  body.castShadow = true;
  group.add(body);

  const band = new THREE.Mesh(
    new THREE.BoxGeometry(BODY_W+0.05, BODY_H*0.28, BODY_D+0.05),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  band.position.y = BODY_H*0.32;
  group.add(band);

  const eyeY = BODY_H*0.78;
  function makeEye(x){
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.08,12,12), new THREE.MeshStandardMaterial({color:0x222222}));
    eye.position.set(x, eyeY, BODY_D/2+0.01);
    return eye;
  }
  group.add(makeEye(-0.18));
  group.add(makeEye(0.18));

  return group;
}

const player = buildEraserModel();
player.position.y = 0;
player.castShadow = true;
scene.add(player);

// ===== 닉네임 표시 (머리 위 텍스트) =====
let nameSprite = null;
function setPlayerName(text){
  if(nameSprite){ player.remove(nameSprite); nameSprite.material.map.dispose(); nameSprite.material.dispose(); }
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256; canvas.height = 64;
  ctx.font = 'bold 34px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const w = ctx.measureText(text).width;
  // 배경 (반투명 알약 모양)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  const padX = 20;
  roundRect(ctx, 128-w/2-padX, 12, w+padX*2, 40, 20);
  ctx.fill();
  // 텍스트
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, 128, 33);

  function roundRect(c, x, y, w, h, r){
    c.beginPath();
    c.moveTo(x+r, y);
    c.arcTo(x+w, y, x+w, y+h, r);
    c.arcTo(x+w, y+h, x, y+h, r);
    c.arcTo(x, y+h, x, y, r);
    c.arcTo(x, y, x+w, y, r);
    c.closePath();
  }

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, depthTest:false, transparent:true});
  nameSprite = new THREE.Sprite(mat);
  nameSprite.scale.set(1.6, 0.4, 1);
  nameSprite.position.set(0, BODY_H+0.5, 0);
  nameSprite.renderOrder = 999;
  player.add(nameSprite);
}
window.setPlayerName = setPlayerName;

// ===== 입력 =====
const keys = {};
addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);

// 조이스틱
let joyVec = {x:0,y:0};
const joystick = document.getElementById('joystick');
const stick = document.getElementById('stick');
let joyActive=false, joyTouchId=null, joyCenter={x:0,y:0};

joystick.addEventListener('touchstart', e=>{
  const t = e.changedTouches[0];
  joyTouchId = t.identifier;
  const rect = joystick.getBoundingClientRect();
  joyCenter = {x:rect.left+rect.width/2, y:rect.top+rect.height/2};
  joyActive = true;
});
addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){
    if(t.identifier===joyTouchId){
      let dx=t.clientX-joyCenter.x, dy=t.clientY-joyCenter.y;
      const max=40;
      const len=Math.hypot(dx,dy);
      if(len>max){dx=dx/len*max; dy=dy/len*max;}
      stick.style.left = (35+dx)+'px';
      stick.style.top = (35+dy)+'px';
      joyVec = {x:dx/max, y:dy/max};
    }
  }
});
addEventListener('touchend', e=>{
  for(const t of e.changedTouches){
    if(t.identifier===joyTouchId){
      joyActive=false; joyVec={x:0,y:0};
      stick.style.left='35px'; stick.style.top='35px';
    }
  }
});

// 점프 버튼
let jumpPressed=false;
const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart', e=>{e.preventDefault(); jumpPressed=true;});
addEventListener('keydown', e=>{if(e.code==='Space') jumpPressed=true;});

// ===== 이동/물리 =====
let velY = 0;
const GRAVITY = -0.011;
const SPEED = 0.12;
let grounded = true;
let facing = 0;

function update(){
  let mx=0, mz=0;
  if(keys['w']||keys['arrowup']) mz -= 1;
  if(keys['s']||keys['arrowdown']) mz += 1;
  if(keys['a']||keys['arrowleft']) mx -= 1;
  if(keys['d']||keys['arrowright']) mx += 1;

  mx += joyVec.x;
  mz += joyVec.y;

  const len = Math.hypot(mx,mz);
  if(len>0.05){
    mx/=len; mz/=len;
    player.position.x += mx*SPEED;
    player.position.z += mz*SPEED;
    facing = Math.atan2(mx, mz);
    let da = facing - player.rotation.y;
    da = Math.atan2(Math.sin(da), Math.cos(da)); // -PI~PI로 정규화 (반대편으로 홱 도는 것 방지)
    player.rotation.y += da*0.08;
  }

  if(jumpPressed && grounded){
    velY = 0.24;
    grounded = false;
  }
  jumpPressed = false;

  velY += GRAVITY;
  player.position.y += velY;
  if(player.position.y <= 0){
    player.position.y = 0;
    velY = 0;
    grounded = true;
  }

  const camOffset = new THREE.Vector3(0, 4.5, 7);
  const targetCamPos = player.position.clone().add(camOffset);
  camera.position.lerp(targetCamPos, 0.1);
  camera.lookAt(player.position.x, player.position.y+1, player.position.z);
}

let gameStarted = false;
function animate(){
  requestAnimationFrame(animate);
  if(!gameStarted) return;
  update();
  renderer.render(scene, camera);
}
animate();
window.startGame = function(){
  gameStarted = true;
};

// ===== 홈 화면: 캐릭터 미리보기 씬 =====
let previewInited = false;
function initPreview(){
  if(previewInited) return;
  previewInited = true;

  const vpEl = document.getElementById('charViewport');
  const pScene = new THREE.Scene();
  const pCamera = new THREE.PerspectiveCamera(45, vpEl.clientWidth/vpEl.clientHeight, 0.1, 50);
  pCamera.position.set(0, 1.6, 4.2);
  pCamera.lookAt(0, 0.9, 0);

  const pRenderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  pRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
  pRenderer.setSize(vpEl.clientWidth, vpEl.clientHeight);
  vpEl.appendChild(pRenderer.domElement);

  pScene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const pSun = new THREE.DirectionalLight(0xffffff, 1.2);
  pSun.position.set(3,5,4);
  pScene.add(pSun);

  // 바닥 원판 그림자 느낌
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(1.3, 32),
    new THREE.MeshBasicMaterial({color:0xff9dc4, transparent:true, opacity:0.35})
  );
  disc.rotation.x = -Math.PI/2;
  disc.position.y = 0.01;
  pScene.add(disc);

  const previewModel = buildEraserModel();
  pScene.add(previewModel);

  function resizePreview(){
    const w = vpEl.clientWidth, h = vpEl.clientHeight;
    pCamera.aspect = w/h;
    pCamera.updateProjectionMatrix();
    pRenderer.setSize(w,h);
  }
  addEventListener('resize', resizePreview);

  let t = 0;
  function previewLoop(){
    requestAnimationFrame(previewLoop);
    t += 0.01;
    previewModel.rotation.y += 0.012;
    previewModel.position.y = Math.sin(t*1.6)*0.06; // 살짝 둥실둥실
    pRenderer.render(pScene, pCamera);
  }
  previewLoop();
}

// ===== 홈 화면 표시/네비게이션 =====
function showHomeScreen(username){
  document.getElementById('homeUserName').textContent = username;
  document.getElementById('homeCharName').textContent = username+'의 지우개';
  document.getElementById('homeScreen').style.display = 'block';
  initPreview();
}

function toast(msg){
  let el = document.getElementById('homeToast');
  if(!el){
    el = document.createElement('div');
    el.id = 'homeToast';
    el.style.cssText = 'position:fixed;left:50%;top:20px;transform:translateX(-50%);'
      +'background:rgba(0,0,0,0.75);color:#fff;padding:10px 18px;border-radius:20px;'
      +'font-size:13px;z-index:200;transition:opacity 0.3s;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity = '0'; }, 1500);
}
